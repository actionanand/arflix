<header class="app-header">
  <a class="brand" routerLink="/" aria-label="ARFlix home">
    <span aria-hidden="true">AR</span>
    <strong>ARFlix</strong>
  </a>

  <nav class="app-nav" aria-label="Primary navigation">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >
    <a
      routerLink="/search"
      [queryParams]="{ q: 'marvel', type: 'movie' }"
      routerLinkActive="is-active"
      >Movies</a
    >
    <a routerLink="/search" [queryParams]="{ q: 'drama', type: 'tv' }" routerLinkActive="is-active"
      >TV</a
    >
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>

<footer class="app-footer">
  <small>This product uses the TMDb API but is not endorsed or certified by TMDb.</small>
</footer>
