<header class="app-header">
  <a class="brand" routerLink="/" aria-label="ARFlix home">
    <img src="ar_flix.png" alt="" width="42" height="42" />
    <strong>ARFlix</strong>
  </a>

  <nav class="app-nav" aria-label="Primary navigation">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >
    <a routerLink="/movies" routerLinkActive="is-active">Movies</a>
    <a routerLink="/tv-shows" routerLinkActive="is-active">TV</a>
    <a routerLink="/search" routerLinkActive="is-active">Search</a>
    <a routerLink="/ar-collection" routerLinkActive="is-active">AR Collection</a>
  </nav>

  <div class="auth-actions">
    @if (auth.isLoggedIn()) {
      <label class="family-toggle">
        <input type="checkbox" [checked]="auth.familyOnly()" (change)="updateFamilyOnly($event)" />
        <span class="family-toggle__track" aria-hidden="true"></span>
        <span>Family</span>
      </label>
      <button type="button" class="nav-button" (click)="auth.logout()">Logout</button>
    } @else {
      <button type="button" class="nav-button" (click)="auth.openDialog()">Login</button>
    }
  </div>
</header>

<app-auth-dialog />

<main class="app-main">
  <router-outlet />
</main>

<footer class="app-footer">
  <small>This product uses the TMDb API but is not endorsed or certified by TMDb.</small>
</footer>
